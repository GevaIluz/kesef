<!DOCTYPE html>
<!--
  kesef — live dashboard. Data injected by server via window.__KESEF__.
  Design is identical to the approved mockup; only the data source changed.
  Direction: warm + friendly, airy & glanceable, auto light/dark, bilingual He/En + RTL.
-->
<html data-theme="light" lang="en" dir="ltr" data-view="me">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kesef · money, made friendly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Assistant:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF3E7; --paper-2:#FFFDF8; --card:#FFFFFF; --ink:#2C2620; --ink-soft:#857A6B;
    --line:#EEE3D2; --teal:#16A78C; --teal-ink:#0C7A66; --coral:#F2795B; --gold:#F4B43C; --berry:#C76699;
    --pos:#1B9E76; --neg:#E0673F;
    --shadow:0 26px 50px -32px rgba(70,50,20,.45); --shadow-sm:0 12px 26px -18px rgba(70,50,20,.4);
    --r:26px; --maxw:1080px; --body:"Assistant",system-ui,sans-serif; --round:"Varela Round","Assistant",sans-serif;
  }
  html[data-theme="dark"]{
    --paper:#17130E; --paper-2:#1E1810; --card:#221B13; --ink:#F4ECDD; --ink-soft:#AD9F8B;
    --line:#332A1E; --teal:#3FD3B4; --teal-ink:#6FE0C7; --coral:#FF9075; --gold:#FFC861; --berry:#E58CBE;
    --pos:#54D6A4; --neg:#FF9173;
    --shadow:0 30px 60px -34px rgba(0,0,0,.8); --shadow-sm:0 14px 30px -20px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper); color:var(--ink); font-family:var(--body); font-weight:500;
    line-height:1.5; -webkit-font-smoothing:antialiased; min-height:100vh; overflow-x:hidden;
    transition:background .5s,color .5s;
  }
  /* soft friendly blobs */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(40% 38% at 88% -6%, color-mix(in srgb,var(--gold) 40%,transparent), transparent 70%),
      radial-gradient(46% 42% at -8% 8%, color-mix(in srgb,var(--coral) 30%,transparent), transparent 70%),
      radial-gradient(50% 50% at 50% 116%, color-mix(in srgb,var(--teal) 26%,transparent), transparent 70%);
    opacity:.5; transition:opacity .5s;}
  .wrap{position:relative;z-index:1;max-width:var(--maxw);margin-inline:auto;padding:26px clamp(16px,4vw,34px) 80px}

  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:26px}
  .brand{display:flex;align-items:baseline;gap:10px;margin-inline-end:auto}
  .brand .mark{font-family:var(--round);font-size:30px;color:var(--teal-ink);letter-spacing:.01em}
  .brand .mark b{color:var(--coral)}
  .brand .tag{font-size:12.5px;color:var(--ink-soft)}
  .seg{display:inline-flex;background:color-mix(in srgb,var(--ink) 6%,transparent);border-radius:999px;padding:4px;gap:2px}
  .seg button{font-family:var(--round);font-size:13px;color:var(--ink-soft);background:none;border:0;padding:8px 15px;border-radius:999px;cursor:pointer;transition:.25s;white-space:nowrap}
  .seg button[aria-pressed="true"]{background:var(--card);color:var(--teal-ink);box-shadow:var(--shadow-sm)}
  .icon-btn{width:40px;height:40px;display:grid;place-items:center;border-radius:999px;border:0;background:var(--card);color:var(--ink);cursor:pointer;font-size:17px;box-shadow:var(--shadow-sm);transition:.25s}
  .icon-btn:hover{transform:translateY(-2px) rotate(-8deg)}

  /* HERO */
  .hero{position:relative;background:linear-gradient(135deg,var(--teal),var(--teal-ink) 86%);color:#fff;
    border-radius:34px;padding:clamp(24px,3.4vw,40px);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
  .hero .coin{position:absolute;border-radius:50%;filter:blur(.5px);opacity:.5}
  .hero-grid{position:relative;display:grid;grid-template-columns:1fr 1.25fr;gap:28px;align-items:center}
  @media(max-width:720px){.hero-grid{grid-template-columns:1fr}}
  .eyebrow{font-family:var(--round);font-size:13px;letter-spacing:.04em;opacity:.85;margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .nw{font-family:var(--round);font-size:clamp(46px,8.5vw,74px);line-height:.95;font-variant-numeric:tabular-nums}
  .nw .cur{opacity:.75;font-size:.46em;vertical-align:.2em;margin-inline-end:.1em}
  .delta{display:inline-flex;align-items:center;gap:8px;margin-top:16px;font-family:var(--round);font-size:14px;background:rgba(255,255,255,.18);padding:8px 14px;border-radius:999px}
  .privacy{margin-top:16px;font-size:13px;opacity:.92;display:flex;gap:9px;max-width:44ch;background:rgba(255,255,255,.12);padding:11px 14px;border-radius:16px}
  .chart svg{width:100%;height:150px;display:block;overflow:visible}
  .chart .lbl{display:flex;justify-content:space-between;margin-top:8px;font-size:11.5px;opacity:.8;font-family:var(--round)}
  #line{fill:none;stroke:#fff;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 6px 12px rgba(0,0,0,.28))}
  #dotlast{fill:#fff;opacity:0;animation:pop .4s 1.1s forwards}
  #area{opacity:0;animation:fade 1s .3s forwards}

  /* STAT STRIP */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
  @media(max-width:560px){.stats{grid-template-columns:1fr}}
  .stat{background:var(--card);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow-sm);opacity:0;transform:translateY(12px);animation:rise .6s forwards}
  .stat .k{font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:7px}
  .stat .v{font-family:var(--round);font-size:30px;margin-top:6px;font-variant-numeric:tabular-nums}
  .stat .v.pos{color:var(--pos)} .stat .v.neg{color:var(--neg)}
  .pill{font-size:11px;font-family:var(--round);padding:2px 9px;border-radius:999px}

  /* CARDS */
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:820px){.cards{grid-template-columns:1fr}}
  .card{background:var(--card);border-radius:var(--r);padding:24px;box-shadow:var(--shadow-sm);opacity:0;transform:translateY(14px);animation:rise .6s forwards}
  .card h3{font-family:var(--round);font-size:19px;margin:0 0 3px}
  .card .sub{font-size:13px;color:var(--ink-soft);margin:0 0 18px}

  .donut-row{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .donut{width:150px;height:150px;border-radius:50%;flex:0 0 auto;position:relative;
    background:conic-gradient(var(--s1) 0 var(--p1),var(--s2) var(--p1) var(--p2),var(--s3) var(--p2) var(--p3),var(--s4) var(--p3) var(--p4),var(--s5) var(--p4) var(--p5),var(--s6) var(--p5) 100%);
    -webkit-mask:radial-gradient(circle 46px at 50% 50%,transparent 98%,#000 100%);mask:radial-gradient(circle 46px at 50% 50%,transparent 98%,#000 100%);
    transform:scale(.6) rotate(-14deg);opacity:0;animation:donut .8s .2s forwards cubic-bezier(.2,.85,.25,1)}
  .donut .ctr{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
  .donut .ctr .t{font-size:11px;color:var(--ink-soft)} .donut .ctr .v{font-family:var(--round);font-size:21px;font-variant-numeric:tabular-nums}
  .legend{display:grid;gap:11px;flex:1 1 150px;min-width:150px}
  .legend .row{display:flex;align-items:center;gap:10px;font-size:14px}
  .legend .sw{width:13px;height:13px;border-radius:5px;flex:0 0 auto}
  .legend .lv{margin-inline-start:auto;font-family:var(--round);color:var(--ink-soft)}
  .legend .more{font-size:12.5px;color:var(--ink-soft)}
  .insight{margin-top:16px;font-size:13px;color:var(--ink-soft);background:color-mix(in srgb,var(--gold) 16%,transparent);border-radius:16px;padding:12px 14px;display:flex;gap:9px}

  .goal{display:flex;align-items:center;gap:16px;padding:14px 0;border-top:1px solid var(--line)}
  .goal:first-of-type{border-top:0}
  .ring{width:58px;height:58px;flex:0 0 auto;transform:rotate(-90deg)}
  .ring .bg{fill:none;stroke:color-mix(in srgb,var(--ink) 10%,transparent);stroke-width:7}
  .ring .fg{fill:none;stroke:var(--teal);stroke-width:7;stroke-linecap:round;stroke-dasharray:var(--c);stroke-dashoffset:var(--c);transition:stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1) .35s}
  .ring.done .fg{stroke:var(--gold)}
  .goal .gn{font-family:var(--round);font-size:15px} .goal .gp{font-size:12.5px;color:var(--ink-soft)}
  .goal .ga{margin-inline-start:auto;text-align:end;font-family:var(--round)}
  .goal .ga small{display:block;color:var(--ink-soft);font-size:11.5px;font-family:var(--body)}

  .recent{margin-top:18px;background:var(--card);border-radius:var(--r);padding:22px 24px;box-shadow:var(--shadow-sm);opacity:0;transform:translateY(14px);animation:rise .6s .3s forwards}
  .recent .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .recent h3{font-family:var(--round);font-size:19px;margin:0}
  .recent .all{font-size:12.5px;color:var(--teal-ink);font-family:var(--round)}
  .tx{display:flex;align-items:center;gap:13px;padding:11px 0;border-top:1px solid var(--line)}
  .tx .ic{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;font-size:16px;background:color-mix(in srgb,var(--coral) 16%,transparent);flex:0 0 auto}
  .tx .n{font-family:var(--round);font-size:14.5px} .tx .c{font-size:11.5px;color:var(--ink-soft)}
  .tx .a{margin-inline-start:auto;font-family:var(--round);font-variant-numeric:tabular-nums;white-space:nowrap}
  .tx .a.pos{color:var(--pos)}

  /* disabled partner/couple buttons */
  .seg button[data-disabled="true"]{opacity:.38;cursor:not-allowed;}

  /* no-data centered message */
  .no-data{display:flex;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px}
  .no-data .inner{max-width:36ch}
  .no-data .logo{font-family:var(--round);font-size:36px;color:var(--teal-ink);margin-bottom:18px}
  .no-data .logo b{color:var(--coral)}
  .no-data .msg{font-size:17px;color:var(--ink-soft);line-height:1.6}
  .no-data code{font-family:monospace;background:color-mix(in srgb,var(--ink) 8%,transparent);padding:2px 7px;border-radius:6px;font-size:15px;color:var(--ink)}

  /* sparkline empty note */
  .spark-note{font-size:12px;opacity:.75;text-align:center;padding:8px 0;font-family:var(--round)}

  footer{margin-top:36px;text-align:center;font-size:12px;color:var(--ink-soft)}
  footer b{color:var(--teal-ink);font-family:var(--round)}

  @keyframes rise{to{opacity:1;transform:none}}
  @keyframes fade{to{opacity:1}}
  @keyframes pop{to{opacity:1}}
  @keyframes donut{to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.card,.stat,.donut,.recent,#area,#dotlast{opacity:1!important;transform:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="mark">ke<b>$</b>ef</span><span class="tag" data-t="tagline">your money</span></div>
    <div class="seg" role="group" aria-label="view">
      <button data-view-btn="me" aria-pressed="true" data-t="v_me">Me</button>
      <button data-view-btn="partner" aria-pressed="false" data-t="v_partner" data-disabled="true">Partner</button>
      <button data-view-btn="couple" aria-pressed="false" data-t="v_couple" data-disabled="true">Couple</button>
    </div>
    <div class="seg" role="group" aria-label="language">
      <button data-lang-btn="en" aria-pressed="true">EN</button>
      <button data-lang-btn="he" aria-pressed="false">עברית</button>
    </div>
    <button class="icon-btn" id="theme" aria-label="toggle theme">◐</button>
  </header>

  <section class="hero">
    <div class="coin" style="width:120px;height:120px;background:var(--gold);top:-30px;inset-inline-end:8%"></div>
    <div class="coin" style="width:60px;height:60px;background:var(--coral);bottom:-14px;inset-inline-end:34%"></div>
    <div class="hero-grid">
      <div>
        <p class="eyebrow">👋 <span data-t="hello">Hi — your money</span></p>
        <div class="nw"><span class="cur">₪</span><span id="nw">0</span></div>
        <div class="delta" id="delta-chip">🌱 <span id="delta"></span></div>
        <div class="privacy" id="privacy" hidden>🔒 <span data-t="privacy">Couple view adds only what you each chose to share. Personal stuff stays private.</span></div>
      </div>
      <div class="chart" id="chart-area">
        <svg id="spark" viewBox="0 0 520 170" preserveAspectRatio="none" aria-label="net worth trend">
          <defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".34"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient></defs>
          <path id="area" fill="url(#g)"></path><path id="line"></path><circle id="dotlast" r="6"></circle>
        </svg>
        <div class="lbl"><span id="lbl-start"></span><span data-t="m_end">now</span></div>
        <div class="spark-note" id="spark-note" hidden></div>
      </div>
    </div>
  </section>

  <div style="margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div class="seg" role="group" aria-label="period" id="period-seg">
      <button data-period-btn="thisMonth" aria-pressed="false" data-t="period_thisMonth">This month</button>
      <button data-period-btn="last30"    aria-pressed="true"  data-t="period_last30">Last 30 days</button>
      <button data-period-btn="last90"    aria-pressed="false" data-t="period_last90">Last 3 months</button>
      <button data-period-btn="year"      aria-pressed="false" data-t="period_year">This year</button>
    </div>
  </div>

  <section class="stats">
    <div class="stat" style="animation-delay:.05s"><div class="k">💸 <span data-t="income">Income</span></div><div class="v pos" id="s-in">₪0</div><span class="pill" style="background:color-mix(in srgb,var(--pos) 18%,transparent);color:var(--pos)" id="s-in-pill"></span></div>
    <div class="stat" style="animation-delay:.1s"><div class="k">🧾 <span data-t="spent">Spent</span></div><div class="v" id="s-out">₪0</div><span class="pill" style="background:color-mix(in srgb,var(--coral) 16%,transparent);color:var(--neg)" id="s-out-pill"></span></div>
    <div class="stat" style="animation-delay:.15s"><div class="k">🐷 <span data-t="saved">Saved</span></div><div class="v" id="s-save" style="color:var(--teal-ink)">₪0</div><span class="pill" style="background:color-mix(in srgb,var(--teal) 16%,transparent);color:var(--teal-ink)" id="s-rate"></span></div>
  </section>

  <div class="cards">
    <section class="card" style="animation-delay:.2s">
      <h3 data-t="spend">Where it goes</h3>
      <p class="sub" id="spend-sub">this month</p>
      <div class="donut-row">
        <div class="donut" id="donut"><div class="ctr"><span class="t" data-t="total">total</span><span class="v" id="d-total">₪0</span></div></div>
        <div class="legend" id="legend"></div>
      </div>
      <div class="insight" id="insight-box">💡 <span id="insight-text"></span></div>
    </section>

    <section class="card" style="animation-delay:.25s">
      <h3 data-t="goals">Your goals</h3>
      <p class="sub" data-t="goals_sub">the fun part 🎉</p>
      <div id="goals"></div>
    </section>
  </div>

  <section class="recent">
    <div class="top"><h3 data-t="recent">Recent</h3><span class="all" data-t="view_all">view all →</span></div>
    <p class="sub" data-t="recent_sub" style="margin:-2px 0 4px">auto-sorted</p>
    <div id="txs"></div>
  </section>

  <footer><span data-t="footer">kesef · local-first · </span><b>kesef</b> · He/En</footer>
</div>

<script>
// Server injects real data here. The placeholder comment is string-replaced with JSON.
window.__KESEF__ = /*__KESEF_DATA__*/ null;

// ─── utilities ───────────────────────────────────────────────────────────────
const NF = n => new Intl.NumberFormat('en-US').format(Math.round(n));
const kfmt = n => '₪' + (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k';
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// ─── category palette (all known codes) ──────────────────────────────────────
const CAT_COLORS = {
  housing:       '#16A78C',
  groceries:     '#F4B43C',
  dining:        '#F2795B',
  transport:     '#5BA8D6',
  health:        '#C76699',
  entertainment: '#A87AD6',
  shopping:      '#D67A9A',
  utilities:     '#76B8D6',
  income:        '#1B9E76',
  transfer:      '#8DB87A',
  savings:       '#4CAF8A',
  investment:    '#3A9ED6',
  fees:          '#B8956A',
  other:         '#B6A88E',
};
const CAT_NEUTRAL = '#B6A88E';

// category → emoji icon
const CAT_ICONS = {
  housing:'🏠', groceries:'🛒', dining:'☕', transport:'🚗', health:'💊',
  entertainment:'🎬', shopping:'🛍', utilities:'💡', income:'💼',
  transfer:'🔄', savings:'🐷', investment:'📈', fees:'🏦', other:'💳',
};
const catIcon = key => CAT_ICONS[key] || '💳';
const catColor = key => CAT_COLORS[key] || CAT_NEUTRAL;

// ─── translations ─────────────────────────────────────────────────────────────
const T = {
  tagline:   { en: 'your money',     he: 'הכסף שלך' },
  hello:     { en: 'Hi — your money', he: 'היי — הכסף שלך' },
  v_me:      { en: 'Me',             he: 'אני' },
  v_partner: { en: 'Partner',        he: 'בן/בת זוג' },
  v_couple:  { en: 'Couple',         he: 'זוגי' },
  income:    { en: 'Income',         he: 'הכנסה' },
  spent:     { en: 'Spent',          he: 'הוצאה' },
  saved:     { en: 'Saved',          he: 'חיסכון' },
  this_month:{ en: 'this month',     he: 'החודש' },
  spend:     { en: 'Where it goes',  he: 'לאן זה הולך' },
  total:     { en: 'total',          he: 'סה״כ' },
  goals:     { en: 'Your goals',     he: 'היעדים שלך' },
  goals_sub: { en: 'the fun part 🎉', he: 'החלק הכיפי 🎉' },
  recent:    { en: 'Recent',         he: 'אחרונות' },
  recent_sub:{ en: 'auto-sorted',    he: 'מסווג אוטומטית' },
  view_all:  { en: 'view all →',     he: '← הצג הכל' },
  m_end:     { en: 'now',            he: 'היום' },
  privacy:   { en: 'Couple view adds only what you each chose to share. Personal stuff stays private.',
               he: 'התצוגה הזוגית מוסיפה רק מה שכל אחד בחר לשתף. הפרטי נשאר פרטי.' },
  footer:    { en: 'kesef · local-first · ', he: 'כסף · מקומי · ' },
  no_data:   { en: "Run <code>npm run sync</code> to load your data",
               he: "הריצו <code>npm run sync</code> כדי לטעון את הנתונים" },
  period_thisMonth: { en: 'This month', he: 'החודש' },
  period_last30:    { en: 'Last 30 days', he: '30 ימים' },
  period_last90:    { en: 'Last 3 months', he: '3 חודשים' },
  period_year:      { en: 'This year', he: 'השנה' },
  no_spend:  { en: 'No spending recorded yet.',
               he: 'לא נרשמו הוצאות.' },
  no_goals:  { en: 'No goals yet — goal tracking is coming soon.',
               he: 'אין יעדים עדיין — מעקב יעדים בקרוב.' },
  no_spark:  { en: 'Your trend builds as you sync.',
               he: 'המגמה תיבנה עם כל סנכרון.' },
  no_forecast:{ en: 'Forecast needs a little more history — keep syncing.',
                he: 'התחזית זקוקה לעוד נתונים — המשיכו לסנכרן.' },
  of_income: { en: '% of income',    he: '% מההכנסה' },
  partner_disabled: { en: 'Arrives with couple-sync', he: 'יגיע עם סנכרון זוגי' },
  more_cats: { en: 'more categories', he: 'קטגוריות נוספות' },
  cat: {
    housing:       { en: 'Housing',       he: 'דיור' },
    groceries:     { en: 'Groceries',     he: 'מזון' },
    dining:        { en: 'Dining',        he: 'מסעדות' },
    transport:     { en: 'Transport',     he: 'תחבורה' },
    health:        { en: 'Health',        he: 'בריאות' },
    entertainment: { en: 'Entertainment', he: 'בידור' },
    shopping:      { en: 'Shopping',      he: 'קניות' },
    utilities:     { en: 'Utilities',     he: 'שירותים' },
    income:        { en: 'Income',        he: 'הכנסה' },
    transfer:      { en: 'Transfer',      he: 'העברה' },
    savings:       { en: 'Savings',       he: 'חיסכון' },
    investment:    { en: 'Investment',    he: 'השקעות' },
    fees:          { en: 'Fees',          he: 'עמלות' },
    other:         { en: 'Other',         he: 'אחר' },
  }
};

let lang = 'en';
let selectedPeriod = 'last30';
const cl = key => (T.cat[key] || { en: key, he: key })[lang];
const t = key => (T[key] || { en: key, he: key })[lang];

// ─── no-data screen ───────────────────────────────────────────────────────────
function renderNoData() {
  document.body.innerHTML = `
    <div class="no-data">
      <div class="inner">
        <div class="logo">ke<b>$</b>ef</div>
        <div class="msg">${T.no_data[lang]}</div>
      </div>
    </div>`;
  // keep theme/lang toggles accessible via keyboard shortcut is not needed;
  // we at minimum re-apply theme so the no-data screen respects dark mode
}

// ─── sparkline ────────────────────────────────────────────────────────────────
function spark(series) {
  if (!series || series.length < 2) {
    $('#spark').hidden = true;
    const note = $('#spark-note');
    note.textContent = t('no_spark');
    note.hidden = false;
    return;
  }
  $('#spark').hidden = false;
  $('#spark-note').hidden = true;
  const w = 520, h = 170, p = 10;
  const mn = Math.min(...series), mx = Math.max(...series), r = (mx - mn) || 1;
  const x = i => p + i * ((w - 2 * p) / (series.length - 1));
  const y = v => h - p - ((v - mn) / r) * (h - 2 * p);
  let d = 'M' + x(0) + ',' + y(series[0]);
  for (let i = 1; i < series.length; i++) {
    const px = x(i - 1), py = y(series[i - 1]), cx = x(i), cy = y(series[i]), m = (px + cx) / 2;
    d += ` C${m},${py} ${m},${cy} ${cx},${cy}`;
  }
  $('#line').setAttribute('d', d);
  $('#area').setAttribute('d', d + ` L${x(series.length - 1)},${h} L${x(0)},${h} Z`);
  const dl = $('#dotlast');
  dl.setAttribute('cx', x(series.length - 1));
  dl.setAttribute('cy', y(series[series.length - 1]));
  const L = $('#line'), len = L.getTotalLength();
  L.style.transition = 'none';
  L.style.strokeDasharray = len;
  L.style.strokeDashoffset = len;
  requestAnimationFrame(() => {
    L.style.transition = 'stroke-dashoffset 1.3s cubic-bezier(.3,.8,.2,1) .25s';
    L.style.strokeDashoffset = 0;
  });
}

// ─── count-up animation ───────────────────────────────────────────────────────
function up(el, to, pre = '', post = '') {
  const t0 = performance.now(), dur = 1000;
  (function s(t) {
    const q = Math.min(1, (t - t0) / dur);
    el.textContent = pre + NF(to * (1 - Math.pow(1 - q, 3))) + post;
    if (q < 1) requestAnimationFrame(s);
  })(performance.now());
}

// ─── donut chart ──────────────────────────────────────────────────────────────
function renderDonut(byCategory) {
  if (!byCategory || byCategory.length === 0) {
    $('#donut').style.display = 'none';
    $('#d-total').textContent = '';
    $('#legend').innerHTML = `<div class="more">${t('no_spend')}</div>`;
    $('#insight-box').hidden = true;
    return;
  }
  $('#donut').style.display = '';
  $('#insight-box').hidden = false;

  // sorted descending (server sends descending but re-sort to be safe)
  const sorted = [...byCategory].sort((a, b) => b.amount - a.amount);
  const tot = sorted.reduce((s, c) => s + c.amount, 0);

  // fill up to 6 slots (donut uses --s1..--s6 / --p1..--p6)
  const slots = sorted.slice(0, 6);
  while (slots.length < 6) slots.push({ category: '__empty', amount: 0 });

  const d = $('#donut');
  let acc = 0;
  slots.forEach((item, i) => {
    const pct = tot > 0 ? (acc + item.amount / tot * 100) : 0;
    d.style.setProperty('--s' + (i + 1), catColor(item.category));
    d.style.setProperty('--p' + (i + 1), pct.toFixed(2) + '%');
    acc = pct;
  });

  $('#d-total').textContent = kfmt(tot);

  // legend: top 3 visible + "+N more" if needed
  const top = sorted.slice(0, 3);
  const extra = sorted.length - 3;
  $('#legend').innerHTML = top.map(item =>
    `<div class="row"><span class="sw" style="background:${catColor(item.category)}"></span>${cl(item.category)}<span class="lv">₪${NF(item.amount)}</span></div>`
  ).join('') + (extra > 0
    ? `<div class="more">+ ${extra} ${t('more_cats')}</div>`
    : '');

  // reset donut animation
  d.style.animation = 'none';
  void d.offsetWidth;
  d.style.animation = '';

  // insight: highlight top category
  const top1 = sorted[0];
  const pct1 = tot > 0 ? Math.round(top1.amount / tot * 100) : 0;
  const periodLabel = t('period_' + selectedPeriod).toLowerCase();
  $('#insight-text').textContent = lang === 'en'
    ? `${cl(top1.category)} is your biggest spend (${periodLabel}) — ${pct1}% of total.`
    : `${cl(top1.category)} היא ההוצאה הגדולה ביותר (${periodLabel}) — ${pct1}% מהסכום.`;
}

// ─── goals ────────────────────────────────────────────────────────────────────
function renderGoals(goals) {
  if (!goals || goals.length === 0) {
    $('#goals').innerHTML = `<div style="color:var(--ink-soft);font-size:14px;padding:12px 0">${t('no_goals')}</div>`;
    return;
  }
  const R = 25, C = 2 * Math.PI * R;
  $('#goals').innerHTML = goals.map(g => {
    const pc = Math.min(1, g.current / g.target);
    const done = pc >= 1;
    const dueLabel = g.targetDate
      ? (lang === 'en' ? 'by ' + g.targetDate : 'עד ' + g.targetDate)
      : '';
    return `<div class="goal">
      <svg class="ring ${done ? 'done' : ''}" viewBox="0 0 58 58">
        <circle class="bg" cx="29" cy="29" r="${R}"/>
        <circle class="fg" cx="29" cy="29" r="${R}" style="--c:${C.toFixed(1)}"/>
      </svg>
      <div>
        <div class="gn">${g.name}</div>
        <div class="gp">${Math.round(pc * 100)}%${done ? ' · ✓ ' + (lang === 'en' ? 'done!' : 'הושג!') : (dueLabel ? ' · ' + dueLabel : '')}</div>
      </div>
      <div class="ga">₪${NF(g.current)}<small>${lang === 'en' ? 'of' : 'מתוך'} ₪${NF(g.target)}</small></div>
    </div>`;
  }).join('');
  requestAnimationFrame(() => {
    $$('#goals .ring .fg').forEach((c, i) => {
      const pc = Math.min(1, goals[i].current / goals[i].target);
      c.style.strokeDashoffset = (C * (1 - pc)).toFixed(1);
    });
  });
}

// ─── recent transactions ──────────────────────────────────────────────────────
function renderTxs(recent) {
  if (!recent || recent.length === 0) {
    $('#txs').innerHTML = `<div class="tx" style="justify-content:center;color:var(--ink-soft);font-size:14px">${lang === 'en' ? 'No recent transactions.' : 'אין עסקאות אחרונות.'}</div>`;
    return;
  }
  $('#txs').innerHTML = recent.map(tx => {
    const cat = tx.category || 'other';
    const icon = catIcon(cat);
    const catLabel = cl(cat) + (tx.rawCategory && tx.rawCategory !== cat ? ` [${tx.rawCategory}]` : '');
    const sign = tx.amount >= 0 ? 1 : -1;
    const abs = Math.abs(tx.amount);
    const dateStr = tx.date ? tx.date.slice(0, 10) : '';
    return `<div class="tx">
      <span class="ic">${icon}</span>
      <div>
        <div class="n">${tx.description || ''}</div>
        <div class="c">${dateStr ? dateStr + ' · ' : ''}${catLabel}</div>
      </div>
      <span class="a ${sign > 0 ? 'pos' : ''}">${sign > 0 ? '+' : '−'}₪${NF(abs)}</span>
    </div>`;
  }).join('');
}

// ─── i18n text nodes ──────────────────────────────────────────────────────────
function applyText() {
  $$('[data-t]').forEach(el => {
    const key = el.dataset.t;
    if (T[key] && typeof T[key] === 'object' && 'en' in T[key]) {
      el.textContent = T[key][lang];
    }
  });
}

// ─── delta chip ───────────────────────────────────────────────────────────────
function renderDelta(series) {
  const chip = $('#delta-chip');
  if (!series || series.length < 2) {
    chip.hidden = true;
    return;
  }
  chip.hidden = false;
  const first = series[0].balance, last = series[series.length - 1].balance;
  const diff = last - first;
  const pct = first !== 0 ? ((diff / Math.abs(first)) * 100).toFixed(1) : null;
  const sign = diff >= 0 ? '+' : '−';
  const pctStr = pct !== null ? ` (${sign}${Math.abs(parseFloat(pct))}%)` : '';
  $('#delta').textContent = `${sign}₪${NF(Math.abs(diff))}${pctStr}`;
}

// ─── sparkline labels ─────────────────────────────────────────────────────────
function renderSparkLabels(series) {
  if (!series || series.length < 2) {
    $('#lbl-start').textContent = '';
    return;
  }
  // show month/year of first point
  const first = series[0].date;
  if (first) {
    try {
      const d = new Date(first);
      $('#lbl-start').textContent = d.toLocaleDateString(lang === 'he' ? 'he-IL' : 'en-US', { month: 'short', year: '2-digit' });
    } catch (e) {
      $('#lbl-start').textContent = first.slice(0, 7);
    }
  }
}

// ─── savings rate pill ────────────────────────────────────────────────────────
function renderSavingsRate(income, saved) {
  const pill = $('#s-rate');
  if (!income || income <= 0) {
    pill.hidden = true;
    return;
  }
  pill.hidden = false;
  pill.textContent = Math.round(saved / income * 100) + t('of_income');
}

// ─── disabled partner/couple buttons ─────────────────────────────────────────
function setupDisabledButtons() {
  $$('[data-disabled="true"]').forEach(btn => {
    const tip = T.partner_disabled[lang];
    btn.title = tip;
    btn.setAttribute('aria-disabled', 'true');
    btn.onclick = e => e.preventDefault();
  });
}

// ─── period spending (stat strip + donut) ────────────────────────────────────
function renderPeriodSpending(M) {
  const p = (M.spending || {})[selectedPeriod] || { income: 0, spent: 0, saved: 0, byCategory: [] };
  const periodLabel = t('period_' + selectedPeriod);
  up($('#s-in'),   p.income, '₪');
  up($('#s-out'),  p.spent,  '₪');
  up($('#s-save'), p.saved,  '₪');
  $('#s-in-pill').textContent  = periodLabel;
  $('#s-out-pill').textContent = periodLabel;
  renderSavingsRate(p.income, p.saved);
  $('#spend-sub').textContent = periodLabel;
  renderDonut(p.byCategory);
  // sync period button states
  $$('[data-period-btn]').forEach(b => b.setAttribute('aria-pressed', b.dataset.periodBtn === selectedPeriod ? 'true' : 'false'));
}

// ─── main render ─────────────────────────────────────────────────────────────
function render() {
  const M = window.__KESEF__;

  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';

  if (M === null || M === undefined) {
    renderNoData();
    return;
  }

  applyText();
  setupDisabledButtons();

  // hero net worth
  up($('#nw'), M.netWorth);

  // delta chip
  renderDelta(M.netWorthSeries);

  // sparkline
  const balances = (M.netWorthSeries || []).map(p => p.balance);
  spark(balances);
  renderSparkLabels(M.netWorthSeries);

  // stat strip + donut — driven by selectedPeriod
  renderPeriodSpending(M);

  // goals
  renderGoals(M.goals);

  // recent transactions
  renderTxs(M.recent);

  // lang/view button states
  $$('[data-lang-btn]').forEach(b => b.setAttribute('aria-pressed', b.dataset.langBtn === lang));
  $$('[data-view-btn]').forEach(b => b.setAttribute('aria-pressed', b.dataset.viewBtn === 'me' ? 'true' : 'false'));
}

// ─── period toggle ────────────────────────────────────────────────────────────
$$('[data-period-btn]').forEach(b => b.onclick = () => {
  selectedPeriod = b.dataset.periodBtn;
  const M = window.__KESEF__;
  if (M) renderPeriodSpending(M);
});

// ─── language toggle ──────────────────────────────────────────────────────────
$$('[data-lang-btn]').forEach(b => b.onclick = () => { lang = b.dataset.langBtn; render(); });

// Partner/Couple buttons are disabled — clicking them is suppressed in setupDisabledButtons()
// Me button is the only active view
$$('[data-view-btn]').forEach(b => {
  if (b.dataset.viewBtn === 'me') {
    b.onclick = () => render();
  }
});

// ─── theme toggle (auto + manual override) ────────────────────────────────────
const mq = matchMedia('(prefers-color-scheme: dark)');
let manual = null;
const cur = () => manual ?? (mq.matches ? 'dark' : 'light');
const applyTheme = () => document.documentElement.dataset.theme = cur();
mq.addEventListener('change', () => { if (manual === null) applyTheme(); });
$('#theme').onclick = () => { manual = cur() === 'dark' ? 'light' : 'dark'; applyTheme(); };
applyTheme();

render();
</script>
</body>
</html>
