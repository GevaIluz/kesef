<!DOCTYPE html>
<!-- Duonero · B5 — visible-by-default, roller-coaster trend, toy piggy bank, spend spotlight, smart goal tips. -->
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Duonero · B5</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF3E7; --card:#FFFFFF; --ink:#2C2620; --soft:#8A7E6D; --line:#EEE3D2;
  --teal:#16A78C; --teal-ink:#0C7A66; --teal-deep:#075D4D; --coral:#F2795B; --gold:#F4B43C; --berry:#C76699;
  --pos:#1B9E76;
  --sh-1:0 1px 2px rgba(70,45,15,.05),0 6px 14px -4px rgba(70,45,15,.08),0 22px 44px -18px rgba(70,45,15,.16);
  --sh-2:0 2px 4px rgba(70,45,15,.06),0 12px 24px -6px rgba(70,45,15,.12),0 34px 64px -22px rgba(70,45,15,.22);
  --r:28px; --round:"Fredoka","Assistant",sans-serif; --body:"Assistant",system-ui,sans-serif;
  --cat-housing:#C05840;--cat-groceries:#E8A820;--cat-dining:#F06048;--cat-shopping:#8848C8;
  --cat-health:#D44878;--cat-transport:#2AA8C4;--cat-utilities:#5578C0;--cat-entertainment:#7038B8;
  --cat-investment:#1870B8;--cat-income:#1B9E76;--cat-transfer:#8A9E78;--cat-other:#9E8A70;
}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--paper);color:var(--ink);font-family:var(--body);font-weight:500;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(44% 38% at 90% -4%, color-mix(in srgb,var(--gold) 40%,transparent), transparent 70%),
  radial-gradient(46% 40% at -6% 10%, color-mix(in srgb,var(--coral) 26%,transparent), transparent 70%),
  radial-gradient(42% 38% at 52% 106%, color-mix(in srgb,var(--teal) 22%,transparent), transparent 70%);opacity:.55}
.wrap{position:relative;z-index:1;max-width:1040px;margin-inline:auto;padding:24px clamp(16px,4vw,34px) 80px}
svg.ic{width:1em;height:1em;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;display:inline-block;vertical-align:-.12em;flex:0 0 auto}
header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;opacity:0;animation:drop .7s .1s cubic-bezier(.2,.9,.3,1.2) forwards}
.mark{font-family:var(--round);font-size:26px;margin-inline-end:auto;display:flex;align-items:center;gap:10px}
.mark .duo{color:var(--teal-ink)}.mark .nero{color:#C9891C}
.logo{width:34px;height:34px;fill:none;stroke-width:2.2;stroke-linecap:round;flex:0 0 auto;filter:drop-shadow(0 3px 5px rgba(70,45,15,.2))}
.seg{display:inline-flex;background:color-mix(in srgb,var(--ink) 6%,transparent);border-radius:999px;padding:4px;gap:2px;box-shadow:inset 0 1px 3px rgba(70,45,15,.08)}
.seg button{font-family:var(--round);font-size:13px;color:var(--soft);background:none;border:0;padding:7px 14px;border-radius:999px;cursor:pointer;transition:.2s;white-space:nowrap}
.seg button[aria-pressed="true"]{background:linear-gradient(180deg,#FFFFFF,#FFF7EA);color:var(--teal-ink);box-shadow:0 2px 6px rgba(70,45,15,.14),inset 0 1px 0 #fff}
.icon-btn{width:42px;height:42px;display:grid;place-items:center;border-radius:999px;border:0;background:linear-gradient(180deg,#FFFFFF,#FFF6E8);color:var(--teal-ink);cursor:pointer;font-size:18px;box-shadow:var(--sh-1),inset 0 1px 0 #fff;transition:transform .25s cubic-bezier(.2,.9,.3,1.4),box-shadow .25s}
.icon-btn:hover{transform:translateY(-3px);box-shadow:var(--sh-2),inset 0 1px 0 #fff}
.icon-btn:active{transform:translateY(0) scale(.95)}
/* ── HERO ── */
.hero{position:relative;color:#fff;border-radius:36px;padding:clamp(26px,3.6vw,42px);overflow:hidden;margin-bottom:18px;
  background:radial-gradient(120% 150% at 85% -20%, #2CC4A4 0%, var(--teal) 38%, var(--teal-ink) 78%, var(--teal-deep) 100%);
  box-shadow:0 36px 70px -28px rgba(7,93,77,.55),0 10px 24px -10px rgba(7,93,77,.4),inset 0 1px 0 rgba(255,255,255,.3),inset 0 -18px 40px -20px rgba(0,0,0,.28);
  opacity:0;transform:translateY(16px) scale(.985);animation:heroIn .9s .18s cubic-bezier(.2,.9,.3,1.1) forwards}
.hero::after{content:"";position:absolute;inset:0;border-radius:36px;pointer-events:none;
  background:radial-gradient(60% 46% at 24% 0%, rgba(255,255,255,.22), transparent 70%)}
.hlayer{position:absolute;inset:0;pointer-events:none;transition:transform .35s cubic-bezier(.2,.8,.3,1)}
/* ── lava-lamp blobs: organic shapes, calm bottom-up drift; click one to split it ── */
.bubbles{position:absolute;inset:0;overflow:hidden;border-radius:36px;pointer-events:none}
.bub{position:absolute;pointer-events:none;animation:bubrise var(--dur) linear var(--delay) forwards;will-change:transform}
.bubskin{width:100%;height:100%;pointer-events:auto;cursor:pointer;opacity:.55;filter:blur(.5px);animation:blob var(--bdur,9s) ease-in-out infinite alternate;transition:transform 1.1s cubic-bezier(.25,.7,.3,1),opacity 1.1s;border-radius:58% 42% 55% 45%/48% 56% 44% 52%}
.bubskin:hover{opacity:.75}
.bubskin.gold{background:radial-gradient(circle at 32% 26%, #FFE9A8 0%, var(--gold) 48%, #C98A18 100%);box-shadow:inset 0 -5px 12px rgba(140,85,0,.3),inset 0 3px 7px rgba(255,255,255,.5)}
.bubskin.coral{background:radial-gradient(circle at 34% 28%, #FFB8A2 0%, var(--coral) 52%, #B84A2E 100%);box-shadow:inset 0 -4px 10px rgba(130,40,10,.3),inset 0 3px 6px rgba(255,255,255,.45)}
.bubskin.mintc{background:radial-gradient(circle at 33% 27%, #C8F5E8 0%, #6CDBBF 55%, #1E8E74 100%);box-shadow:inset 0 -4px 10px rgba(6,80,60,.3),inset 0 3px 6px rgba(255,255,255,.5)}
@keyframes bubrise{to{transform:translate(var(--dx),var(--rise))}}
@keyframes blob{0%{border-radius:58% 42% 55% 45%/48% 56% 44% 52%}50%{border-radius:44% 56% 48% 52%/58% 43% 57% 42%}100%{border-radius:52% 48% 40% 60%/44% 55% 45% 56%}}
.bubskin.heart{background:none!important;box-shadow:none!important;filter:none;animation:heartbeat var(--bdur,9s) ease-in-out infinite}
.bubskin.heart svg{width:100%;height:100%;display:block}
@keyframes heartbeat{0%,100%{transform:rotate(-6deg) scale(1)}25%{transform:rotate(4deg) scale(1.06)}50%{transform:rotate(-3deg) scale(.97)}75%{transform:rotate(5deg) scale(1.04)}}
.bubskin.born{transform:scale(.12);opacity:0}
.bubskin.pop{transform:scale(1.45);opacity:0}
.hero-inner{position:relative;pointer-events:none}
.hero-inner :is(button,a,.chip,.cycle-track){pointer-events:auto}
/* piggy coin-drop on the Saved chip */
.piggywrap{position:relative;display:inline-flex}
.piggywrap .dropc{position:absolute;top:-11px;inset-inline-start:4px;width:7px;height:7px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFE9A8,#F4B43C 60%,#C98A18);opacity:0;animation:coindrop 4.5s 1.8s ease-in infinite}
@keyframes coindrop{0%{opacity:0;transform:translateY(-8px)}6%{opacity:1}22%{transform:translateY(4px) scaleY(1);opacity:1}30%{transform:translateY(8px) scaleY(.35);opacity:0}100%{opacity:0}}
.greet{font-family:var(--round);font-size:15px;opacity:.92;display:flex;align-items:center;gap:9px;margin:0 0 4px}
.greet .ic{font-size:17px}
.gsub{font-size:13px;opacity:.78;margin:0 0 18px}
.big{font-family:var(--round);font-size:clamp(46px,7.5vw,70px);line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 3px 14px rgba(0,0,0,.18)}
.big .cur{opacity:.65;font-size:.44em;vertical-align:.28em;margin-inline-end:.08em}
.big-k{font-size:14px;opacity:.85;margin-top:8px}
.cycle-track{margin-top:22px;height:14px;border-radius:999px;background:rgba(0,0,0,.22);box-shadow:inset 0 2px 5px rgba(0,0,0,.3);overflow:hidden;max-width:520px;position:relative}
.cycle-track i{display:block;height:100%;width:0;border-radius:999px;background:linear-gradient(180deg,#FFDf8E,var(--gold) 60%,#DE9C1E);box-shadow:0 0 16px rgba(244,180,60,.55),inset 0 1px 0 rgba(255,255,255,.6);transition:width 1.4s .7s cubic-bezier(.2,.85,.25,1);position:relative;overflow:hidden}
.cycle-track i::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);transform:translateX(-100%);animation:sheen 3.4s 2.2s infinite}
@keyframes sheen{0%{transform:translateX(-100%)}45%,100%{transform:translateX(100%)}}
html[dir=rtl] .cycle-track i::after{animation-name:sheenR}
@keyframes sheenR{0%{transform:translateX(100%)}45%,100%{transform:translateX(-100%)}}
.cycle-days{font-family:var(--round);font-size:12.5px;opacity:.85;margin-top:8px}
.hero-chips{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
.chip{background:linear-gradient(180deg,rgba(255,255,255,.2),rgba(255,255,255,.1));backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.22);border-radius:20px;padding:12px 17px;min-width:126px;box-shadow:0 8px 18px -8px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.3);opacity:0;transform:translateY(14px);animation:drop .6s cubic-bezier(.2,.9,.3,1.3) forwards;transition:transform .25s}
.chip:hover{transform:translateY(-3px)}
.chip .ck{font-size:12px;opacity:.85;display:flex;gap:7px;align-items:center}
.chip .cv{font-family:var(--round);font-size:21px;margin-top:3px;font-variant-numeric:tabular-nums}
.chip .cs{font-size:10.5px;opacity:.72}
/* ── layout ── */
.periods{margin:0 0 16px;opacity:0;animation:drop .6s .5s forwards}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.cards{grid-template-columns:1fr}}
.card{background:linear-gradient(180deg,#FFFFFF 0%,#FFFAF1 100%);border:1px solid rgba(255,255,255,.8);border-radius:var(--r);padding:24px 26px;box-shadow:var(--sh-1),inset 0 1px 0 #fff;transition:box-shadow .3s,transform .3s cubic-bezier(.2,.9,.3,1.2);opacity:0;transform:translateY(18px);animation:drop .7s cubic-bezier(.2,.9,.3,1.15) forwards}
.card:hover{box-shadow:var(--sh-2),inset 0 1px 0 #fff;transform:translateY(-3px)}
.card h3{font-family:var(--round);font-size:18px;margin:0 0 2px;display:flex;align-items:center;gap:9px}
.card h3 .hic{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;font-size:15px;color:#fff;background:linear-gradient(160deg,var(--hc,#16A78C),color-mix(in srgb,var(--hc,#0C7A66) 70%,#000 12%));box-shadow:0 5px 10px -4px color-mix(in srgb,var(--hc,#0C7A66) 70%,transparent),inset 0 1px 0 rgba(255,255,255,.4)}
.card .sub{font-size:13px;color:var(--soft);margin:0 0 16px}
.full{grid-column:1/-1}
/* donut */
.donut-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.donut-wrap{width:158px;height:158px;flex:0 0 auto;filter:drop-shadow(0 10px 16px rgba(70,45,15,.18))}
.donut-wrap svg{width:158px;height:158px;overflow:visible;display:block}
.donut-seg{cursor:pointer;transition:transform .2s cubic-bezier(.2,.9,.3,1.4),opacity .2s;transform-origin:50% 50%;transform-box:fill-box;opacity:0;animation:segIn .5s forwards}
.donut-seg:hover{transform:scale(1.06)}
@keyframes segIn{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:none}}
.legend{display:grid;gap:8px;flex:1 1 170px;min-width:170px}
.legend .row{display:flex;align-items:center;gap:10px;font-size:13.5px;border-radius:12px;padding:5px 8px;margin:-2px -8px;transition:background .15s,transform .15s;cursor:pointer}
.legend .row:hover{background:color-mix(in srgb,var(--ink) 5%,transparent);transform:translateX(-2px)}
html[dir=ltr] .legend .row:hover{transform:translateX(2px)}
.legend .lic{width:26px;height:26px;border-radius:9px;display:grid;place-items:center;font-size:13px;color:#fff;flex:0 0 auto;background:linear-gradient(160deg,var(--c),color-mix(in srgb,var(--c) 72%,#000 12%));box-shadow:0 4px 8px -3px color-mix(in srgb,var(--c) 65%,transparent),inset 0 1px 0 rgba(255,255,255,.35)}
.legend .lv{margin-inline-start:auto;font-family:var(--round);color:var(--soft);font-variant-numeric:tabular-nums}
/* paycheck */
.pay-flow{display:flex;height:56px;border-radius:18px;overflow:hidden;margin:4px 0 14px;box-shadow:inset 0 2px 6px rgba(70,45,15,.14),0 8px 16px -8px rgba(70,45,15,.2)}
.pay-flow i{display:grid;place-items:center;font-family:var(--round);font-size:11.5px;color:#fff;overflow:hidden;white-space:nowrap;flex-grow:0;flex-basis:0;transition:flex-grow 1s cubic-bezier(.2,.85,.25,1);background-image:linear-gradient(180deg,rgba(255,255,255,.22),transparent 55%,rgba(0,0,0,.12))}
.pay-legend{display:flex;flex-wrap:wrap;gap:8px 18px;font-size:13px}
.pay-legend .pi{display:flex;align-items:center;gap:7px}
.pay-legend .sw{width:12px;height:12px;border-radius:4px;box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}
.pay-legend .pv{font-family:var(--round);color:var(--soft)}
.gift{margin-top:14px;font-size:13.5px;background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 22%,#fff),color-mix(in srgb,var(--gold) 14%,#fff));border:1px solid color-mix(in srgb,var(--gold) 40%,transparent);border-radius:18px;padding:13px 16px;display:flex;gap:11px;align-items:flex-start;box-shadow:0 8px 18px -10px color-mix(in srgb,var(--gold) 55%,transparent),inset 0 1px 0 rgba(255,255,255,.7)}
.gift .gic{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;color:#fff;background:linear-gradient(160deg,#FFC855,#DE9C1E);box-shadow:0 4px 9px -3px rgba(190,130,20,.6),inset 0 1px 0 rgba(255,255,255,.5);flex:0 0 auto;font-size:14px}
.gift b{font-family:var(--round);color:var(--teal-ink)}
/* goals */
.goal{display:flex;align-items:center;gap:14px;padding:13px 0;border-top:1px solid var(--line);cursor:pointer;transition:background .15s}
.goal:hover{background:color-mix(in srgb,var(--ink) 4%,transparent)}
.goal:first-of-type{border-top:0}
.goal-tip{display:none;font-size:13px;line-height:1.55;background:color-mix(in srgb,var(--teal) 8%,transparent);border:1px solid color-mix(in srgb,var(--teal) 20%,transparent);border-radius:14px;padding:11px 14px;margin:2px 0 10px}
.goal-tip.open{display:block;animation:drop .3s cubic-bezier(.2,.9,.3,1.2)}
.goal-tip b{font-family:var(--round);color:var(--teal-ink)}
.ring{width:56px;height:56px;flex:0 0 auto;transform:rotate(-90deg);filter:drop-shadow(0 4px 6px rgba(70,45,15,.15))}
.ring .bg{fill:none;stroke:color-mix(in srgb,var(--ink) 8%,transparent);stroke-width:7}
.ring .fg{fill:none;stroke:url(#ringGrad);stroke-width:7;stroke-linecap:round;stroke-dasharray:var(--c);stroke-dashoffset:var(--c);transition:stroke-dashoffset 1.3s cubic-bezier(.2,.8,.2,1) .6s}
.goal .gn{font-family:var(--round);font-size:14.5px}
.goal .gp{font-size:12px;color:var(--soft)}
.goal .ga{margin-inline-start:auto;text-align:end;font-family:var(--round);font-variant-numeric:tabular-nums}
.goal .ga small{display:block;color:var(--soft);font-size:11px;font-family:var(--body)}
/* wealth card */
.nw-card{background:linear-gradient(150deg,#453A2B 0%,#2C2620 55%,#231D16 100%);color:#FBF3E7;border-color:rgba(255,255,255,.06);box-shadow:0 30px 56px -24px rgba(35,25,10,.6),inset 0 1px 0 rgba(255,255,255,.09)}
.nw-card h3{color:#fff}
.nw-card .sub{color:#BFB29D}
.nw-big{font-family:var(--round);font-size:clamp(34px,4.5vw,46px);line-height:1;font-variant-numeric:tabular-nums;margin:6px 0 4px;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.nw-big .cur{opacity:.55;font-size:.5em;vertical-align:.3em}
.nw-hint{font-size:12.5px;color:#BFB29D;display:flex;align-items:center;gap:8px}
.nw-spark{position:relative}
.nw-spark svg{width:100%;height:58px;display:block;overflow:visible;margin-top:12px;cursor:crosshair}
#nw-guide{stroke:rgba(251,243,231,.4);stroke-width:1;stroke-dasharray:3 4;opacity:0}
#nw-dot{fill:var(--gold);opacity:0;filter:drop-shadow(0 2px 6px rgba(244,180,60,.6))}
.nw-spark.hovering #nw-guide,.nw-spark.hovering #nw-dot{opacity:1}
#nw-tip{position:absolute;z-index:50;background:#FBF3E7;color:#2C2620;border-radius:12px;padding:7px 12px;font-family:var(--round);box-shadow:0 10px 26px -6px rgba(0,0,0,.45);pointer-events:none;display:none;white-space:nowrap;text-align:center;transform:translate(-50%,-118%)}
#nw-tip .ta2{font-size:14px;font-variant-numeric:tabular-nums}
#nw-tip .td2{font-size:10.5px;color:#8A7E6D;margin-top:1px}
.nw-spark path.l{fill:none;stroke:var(--gold);stroke-width:2.5;stroke-linecap:round;filter:drop-shadow(0 3px 6px rgba(244,180,60,.4));stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 1.8s .8s cubic-bezier(.4,0,.2,1) forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.nw-spark path.a{fill:url(#gg);opacity:0;animation:fadein 1s 1.6s forwards}
@keyframes fadein{to{opacity:.5}}
.hz-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
@media(max-width:640px){.hz-tiles{grid-template-columns:1fr}}
.hz{border-radius:18px;padding:14px 16px;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.1);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 10px 20px -12px rgba(0,0,0,.5)}
.hz .k{font-size:12px;color:#BFB29D;display:flex;gap:8px;align-items:center}
.hz .k .hzic{width:24px;height:24px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:12px;background:linear-gradient(160deg,var(--c),color-mix(in srgb,var(--c) 70%,#000 20%));box-shadow:inset 0 1px 0 rgba(255,255,255,.3)}
.hz .v{font-family:var(--round);font-size:20px;margin-top:5px;font-variant-numeric:tabular-nums}
.acc-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid rgba(255,255,255,.09)}
.acc-row:first-of-type{border-top:0}
.acc-ic{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;font-size:15px;color:#FBF3E7;background:linear-gradient(160deg,rgba(255,255,255,.14),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.12);flex:0 0 auto}
.acc-name{font-family:var(--round);font-size:14px}
.acc-meta{font-size:11.5px;color:#BFB29D}
.acc-bal{margin-inline-start:auto;font-family:var(--round);font-variant-numeric:tabular-nums;white-space:nowrap}
/* recent */
.tx{display:flex;align-items:center;gap:13px;padding:10px 8px;margin:0 -8px;border-radius:14px;border-top:1px solid var(--line);transition:background .15s}
.tx:hover{background:color-mix(in srgb,var(--ink) 4%,transparent)}
.tx:first-of-type{border-top:0}
.tx .ic{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;font-size:16px;color:#fff;background:linear-gradient(160deg,var(--c,#9E8A70),color-mix(in srgb,var(--c,#9E8A70) 72%,#000 12%));box-shadow:0 5px 10px -4px color-mix(in srgb,var(--c,#9E8A70) 60%,transparent),inset 0 1px 0 rgba(255,255,255,.35);flex:0 0 auto}
.tx .n{font-family:var(--round);font-size:14px}
.tx .c{font-size:11.5px;color:var(--soft)}
.tx .a{margin-inline-start:auto;font-family:var(--round);font-variant-numeric:tabular-nums;white-space:nowrap}
.tx .a.pos{color:var(--pos)}
/* spend spotlight */
#spend-card .donut-wrap,#spend-card .donut-wrap svg{width:216px;height:216px}
#spend-card .donut-row{gap:34px}
#spend-card .legend{grid-template-columns:1fr 1fr;gap:8px 26px}
@media(max-width:640px){#spend-card .legend{grid-template-columns:1fr}}
footer{margin-top:34px;text-align:center;font-size:12px;color:var(--soft)}
/* ── piggy what-if game ── */
.pg-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:28px;align-items:center}
@media(max-width:720px){.pg-grid{grid-template-columns:1fr}}
.pg-cats{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 14px}
.pg-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--round);font-size:12.5px;border:1.5px solid var(--line);background:#fff;color:var(--soft);border-radius:999px;padding:6px 13px;cursor:pointer;transition:.18s}
.pg-chip:hover{border-color:var(--teal)}
.pg-chip.on{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 6px 14px -6px rgba(12,122,102,.5)}

.pg-piggy svg{width:126px;height:106px;transform-origin:50% 88%;animation:pgwob 3.2s ease-in-out infinite}

.pcoin.c2{animation-delay:calc(var(--cd,1.6s)*.33)}.pcoin.c3{animation-delay:calc(var(--cd,1.6s)*.66)}

.pg-monthly{font-size:12.5px;color:var(--soft)}

.pg-fv-k{font-size:12.5px;color:var(--soft)}

.modal-ov{position:fixed;inset:0;z-index:100;background:rgba(30,22,10,.4);backdrop-filter:blur(4px);display:grid;place-items:center;padding:18px}

.modal-c{background:linear-gradient(180deg,#FFFFFF,#FFFAF1);border-radius:24px;box-shadow:var(--sh-2);max-width:440px;width:100%;max-height:80vh;overflow:auto;padding:20px 22px;animation:drop .35s cubic-bezier(.2,.9,.3,1.2)}

.mclose:hover{background:rgba(0,0,0,.06)}
.mtotal{font-size:12.5px;color:var(--soft);margin:2px 0 8px}
/* ── couple view ── */
.cp-note{font-size:12px;color:var(--teal-ink);background:color-mix(in srgb,var(--teal) 9%,transparent);border-radius:14px;padding:10px 14px;margin-bottom:16px;display:flex;gap:9px;align-items:center}

.cv-tile.hl{background:linear-gradient(160deg,var(--teal),var(--teal-ink));color:#fff;border-color:transparent;box-shadow:0 14px 26px -12px rgba(12,122,102,.55)}

function goalTip(g){
  const remaining=g.targetAmount-g.currentAmount;
  if(remaining<=0)return t('tip_done');
  const pace=Math.max(0,M.cycle.income-M.cycle.spent);
  if(g.targetDate){
    const months=Math.max(1,(new Date(g.targetDate)-new Date(M.generatedAt))/(30.44*864e5));
    const need=remaining/months;
    if(need<=pace)return t('tip_ontrack',{need:sh(need),pace:sh(pace),date:fmtDate(g.targetDate)});
    const gap=need-pace,flex=['dining','shopping','entertainment','groceries'];
    let acc=0,parts=[];
    for(const k of flex){const amt=(M.cycle.byCategory.find(c=>c.category===k)||{}).amount||0;
      if(amt<=0)continue;const cut=Math.min(amt*.25,gap-acc);if(cut<=0)break;
      parts.push(tc(k)+' −'+sh(cut));acc+=cut;if(acc>=gap)break;}
    return acc>=gap?t('tip_trim',{need:sh(need),parts:parts.join(' · ')}):t('tip_hard',{need:sh(need)});
  }
  const m2=pace>0?Math.ceil(remaining/pace):null;
  return m2?t('tip_nodate',{pace:sh(pace),m:m2}):t('tip_hard',{need:sh(remaining)});
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')$('#cat-modal').classList.add('hidden')});
/* ── couple view (demo partner data — simulated) ── */
const PARTNER={total:96400,accounts:[{n:{he:'עו״ש לאומי',en:'Leumi checking'},v:12400},{n:{he:'קרן השתלמות',en:'Study fund'},v:34000},{n:{he:'קופת גמל',en:'Provident fund'},v:50000}],
  spend:{groceries:640,dining:380,housing:1240},goal:{target:24000,mine:9800,partner:6400}};
const MY_SHARED=M.composition.daily+M.composition.medium;
const cvRow=(who,n,v,mx,c)=>`<div class="cv-row"><span class="who">${who}</span><span class="nm">${n}</span><span class="track"><span class="fill" style="width:${(v/mx*100).toFixed(1)}%;background:${c}"></span></span><span class="amt">${wealth(v)}</span></div>`;
function renderCouple(){
  $('#cp-h').textContent=t('cp_together');$('#cp-s').textContent=t('cp_s');
  $('#cp-note').innerHTML=ic('eye',14)+' '+t('cp_demo');
  const together=MY_SHARED+PARTNER.total;
  $('#cv-tiles').innerHTML=[[t('cp_you'),MY_SHARED,''],[t('cp_partner'),PARTNER.total,''],[t('cp_together'),together,'hl']]
    .map(([k,v,cls])=>`<div class="cv-tile ${cls}"><div class="k">${k}</div><div class="v">${wealth(v)}</div></div>`).join('');
  $('#cp-holds-h').textContent=t('cp_holds');
  const mx=Math.max(MY_SHARED,...PARTNER.accounts.map(a=>a.v));
  $('#cv-holds').innerHTML=cvRow(t('cp_you'),lang==='he'?'עו״ש + השקעות':'Checking + investments',MY_SHARED,mx,'var(--teal)')
    +PARTNER.accounts.map(a=>cvRow(t('cp_partner'),a.n[lang],a.v,mx,'var(--gold)')).join('');
  $('#cv-leg').innerHTML=`<span><span class="sw" style="background:var(--teal)"></span>${t('cp_you')}</span><span><span class="sw" style="background:var(--gold)"></span>${t('cp_partner')}</span>`;
  $('#cp-spend-h').textContent=t('cp_spend_h');$('#cp-spend-s').textContent=t('cp_spend_s');
  const cats=['housing','groceries','dining'];
  const mine=k=>(M.cycle.byCategory.find(c=>c.category===k)||{amount:0}).amount;
  const mxs=Math.max(...cats.map(k=>mine(k)+PARTNER.spend[k]));
  $('#cv-spend').innerHTML=cats.map(k=>{const a=mine(k),b=PARTNER.spend[k];
    return `<div class="cv-row"><span class="nm" style="flex-basis:86px">${tc(k)}</span><span class="track"><span class="fill" style="width:${(a/mxs*100).toFixed(1)}%;background:var(--teal)"></span><span class="fill" style="width:${(b/mxs*100).toFixed(1)}%;background:var(--gold);border-start-start-radius:0;border-end-start-radius:0"></span></span><span class="amt">${sh(a+b)}</span></div>`}).join('');
  const g=PARTNER.goal,cur=g.mine+g.partner,pr=Math.min(1,cur/g.target),C3=2*Math.PI*24;
  $('#cp-goal-h').textContent=t('cp_goal_h');$('#cp-goal-s').textContent=t('cp_goal_s')+' · '+t('cp_goal_hint');
  const rem=g.target-cur,mC=6,each=rem/2/mC;
  $('#cv-goal').innerHTML=`<div class="goal" id="cp-goal-row" style="border-top:0"><svg class="ring" viewBox="0 0 56 56"><circle class="bg" cx="28" cy="28" r="24"></circle><circle class="fg" cx="28" cy="28" r="24" stroke-dasharray="${C3}" style="stroke-dashoffset:${C3*(1-pr)}"></circle></svg><div><div class="gn">${t('cp_goal_name')}</div><div class="gp">${Math.round(pr*100)}%</div></div><div class="ga">${sh(cur)}<small>/ ${sh(g.target)}</small></div></div>
  <div class="goal-tip" id="cp-goal-tip">${t('cp_tip',{a:sh(each),b:sh(each),m:mC})}</div>
  <div class="cv-leg"><span><span class="sw" style="background:var(--teal)"></span>${t('cp_you')} ${sh(g.mine)}</span><span><span class="sw" style="background:var(--gold)"></span>${t('cp_partner')} ${sh(g.partner)}</span></div>`;
  $('#cp-goal-row').onclick=()=>$('#cp-goal-tip').classList.toggle('open');
}
render();
</script>
</body>
</html>
